<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="920" viewBox="0 0 1200 920" role="img" aria-labelledby="title desc">
  <title id="title">客服绩效 BI 手机端核心页面线框图</title><desc id="desc">并列展示手机 Dashboard、导入人员选择和个人详情三种核心页面布局。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eaf2fb"/></linearGradient><linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1d4ed8"/><stop offset="1" stop-color="#0891b2"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#213b59" flood-opacity=".16"/></filter><style>text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#18324f}.title{font-size:28px;font-weight:700}.phoneTitle{font-size:15px;font-weight:700}.small{font-size:10px;fill:#667b90}.tiny{font-size:9px;fill:#6f8296}.phone{fill:#fff;stroke:#17324d;stroke-width:5}.panel{fill:#fff;stroke:#d4dfeb}.chip{fill:#edf3f8}.hero{fill:url(#hero)}.blue{fill:#2563eb}.green{fill:#10b981}.warn{fill:#f59e0b}.disabled{fill:#e2e8f0}.line{fill:none;stroke:#2563eb;stroke-width:3}</style></defs>
  <rect width="1200" height="920" fill="url(#bg)"/><text x="50" y="56" class="title">手机端核心布局</text><text x="50" y="84" class="small">移动端优先显示关键 KPI、榜单和导入状态；复杂矩阵与底层明细折叠进入二级页</text>

  <!-- Phone 1 -->
<g transform="translate(60 120)" filter="url(#shadow)"><rect width="320" height="700" rx="38" class="phone"/><rect x="110" y="12" width="100" height="20" rx="10" fill="#17324d"/><text x="22" y="68" class="phoneTitle">团队表现</text><text x="22" y="88" class="tiny">07-22 · 商丘组 · 18 人</text><rect x="244" y="50" width="54" height="34" rx="10" class="blue"/><text x="271" y="72" text-anchor="middle" class="tiny" style="fill:#fff">上传</text>
<rect x="18" y="108" width="284" height="116" rx="20" class="hero"/><text x="36" y="136" class="tiny" style="fill:#ddf6ff">团队综合健康度</text><text x="36" y="184" class="title" style="fill:#fff">86.4</text><text x="140" y="184" class="small" style="fill:#ddf6ff">14 / 18 人达标</text>
  <g transform="translate(18 240)"><rect width="90" height="78" rx="14" class="panel"/><text x="12" y="24" class="tiny">满意率</text><text x="12" y="52" class="phoneTitle">91.8%</text><rect x="97" width="90" height="78" rx="14" class="panel"/><text x="109" y="24" class="tiny">均响</text><text x="109" y="52" class="phoneTitle">19.6s</text><rect x="194" width="90" height="78" rx="14" class="panel"/><text x="206" y="24" class="tiny">转化率</text><text x="206" y="52" class="phoneTitle">38.2%</text></g>
  <rect x="18" y="336" width="284" height="150" rx="18" class="panel"/><text x="34" y="364" class="phoneTitle">7 日趋势</text><polyline points="38,456 78,420 118,435 158,390 198,410 238,372 286,388" class="line"/>
  <rect x="18" y="502" width="284" height="118" rx="18" class="panel"/><text x="34" y="530" class="phoneTitle">今日前三</text><text x="34" y="558" class="small">1　售后楠楠　96.2</text><text x="34" y="584" class="small">2　等等　　　92.8</text><text x="34" y="610" class="small">3　售后小舒　89.4</text>
  <rect x="0" y="648" width="320" height="52" rx="0" fill="#f8fafc"/><text x="40" y="680" class="tiny">首页</text><text x="112" y="680" class="tiny">榜单</text><text x="184" y="680" class="tiny">人员</text><text x="256" y="680" class="tiny">导入</text></g>
  <text x="220" y="856" text-anchor="middle" class="phoneTitle">Dashboard</text>

  <!-- Phone 2 -->
<g transform="translate(440 120)" filter="url(#shadow)"><rect width="320" height="700" rx="38" class="phone"/><rect x="110" y="12" width="100" height="20" rx="10" fill="#17324d"/><text x="22" y="68" class="phoneTitle">选择人员</text><text x="22" y="90" class="tiny">步骤 3 / 5 · 已选 18 · 排除 36</text><rect x="18" y="108" width="284" height="40" rx="12" class="chip"/><text x="34" y="133" class="tiny">搜索账号或昵称…</text><g transform="translate(18 162)"><rect width="62" height="30" rx="10" class="chip"/><text x="31" y="20" text-anchor="middle" class="tiny">全选</text><rect x="70" width="62" height="30" rx="10" class="chip"/><text x="101" y="20" text-anchor="middle" class="tiny">反选</text><rect x="140" width="144" height="30" rx="10" class="blue"/><text x="212" y="20" text-anchor="middle" class="tiny" style="fill:#fff">使用默认名单</text></g>
<g transform="translate(18 210)"><g><rect width="284" height="82" rx="14" class="panel"/><rect x="14" y="14" width="20" height="20" rx="5" class="blue"/><text x="24" y="29" text-anchor="middle" class="tiny" style="fill:#fff">✓</text><text x="48" y="30" class="phoneTitle">售后小舒</text><text x="48" y="54" class="tiny">满意 91.3% · 均响 15s · 转化 31%</text></g><g transform="translate(0 94)"><rect width="284" height="82" rx="14" class="panel"/><rect x="14" y="14" width="20" height="20" rx="5" class="blue"/><text x="24" y="29" text-anchor="middle" class="tiny" style="fill:#fff">✓</text><text x="48" y="30" class="phoneTitle">售后楠楠</text><text x="48" y="54" class="tiny">满意 100% · 均响 13s · 转化 30.8%</text></g><g transform="translate(0 188)"><rect width="284" height="92" rx="14" fill="#eff6ff" stroke="#60a5fa"/><rect x="14" y="14" width="20" height="20" rx="5" fill="#fff" stroke="#60a5fa"/><text x="48" y="30" class="phoneTitle">小至</text><text x="224" y="30" class="tiny">新人员</text><text x="48" y="55" class="tiny">来源账号：训练师kk</text><text x="48" y="76" class="tiny">默认不选中 · 需要确认映射</text></g><g transform="translate(0 292)"><rect width="284" height="92" rx="14" fill="#fff7ed" stroke="#f59e0b"/><text x="20" y="30" class="phoneTitle">缺失提醒</text><text x="20" y="55" class="tiny">默认名单有 2 人未出现在 Excel</text><text x="20" y="76" class="tiny">不记未达标，连续记录默认暂停</text></g></g>
<rect x="18" y="618" width="284" height="48" rx="13" class="blue"/><text x="160" y="648" text-anchor="middle" class="phoneTitle" style="fill:#fff">进入校验预览</text></g>
  <text x="600" y="856" text-anchor="middle" class="phoneTitle">导入人员选择</text>

  <!-- Phone 3 -->
<g transform="translate(820 120)" filter="url(#shadow)"><rect width="320" height="700" rx="38" class="phone"/><rect x="110" y="12" width="100" height="20" rx="10" fill="#17324d"/><text x="22" y="68" class="tiny">← 人员列表</text><circle cx="56" cy="120" r="30" class="blue"/><text x="56" y="126" text-anchor="middle" class="phoneTitle" style="fill:#fff">楠</text><text x="100" y="112" class="phoneTitle">售后楠楠</text><text x="100" y="135" class="tiny">第 1 / 18 · 96.2</text>
  <g transform="translate(18 166)"><rect width="136" height="80" rx="14" class="panel"/><text x="14" y="24" class="tiny">满意率</text><text x="14" y="55" class="phoneTitle">100%</text><rect x="148" width="136" height="80" rx="14" class="panel"/><text x="162" y="24" class="tiny">平均响应</text><text x="162" y="55" class="phoneTitle">13 秒</text><rect y="92" width="136" height="80" rx="14" class="panel"/><text x="14" y="116" class="tiny">转化率</text><text x="14" y="147" class="phoneTitle">30.8%</text><rect x="148" y="92" width="136" height="80" rx="14" class="panel"/><text x="162" y="116" class="tiny">连续记录</text><text x="162" y="147" class="phoneTitle">3 次第一</text></g>
  <rect x="18" y="360" width="284" height="150" rx="18" class="panel"/><text x="34" y="388" class="phoneTitle">30 日趋势</text><polyline points="38,480 78,450 118,460 158,415 198,430 238,395 286,405" class="line"/>
  <rect x="18" y="528" width="284" height="96" rx="18" class="panel"/><text x="34" y="556" class="phoneTitle">荣誉</text><rect x="34" y="570" width="112" height="30" rx="15" fill="#dcfce7"/><text x="90" y="590" text-anchor="middle" class="tiny">综合冠军</text><rect x="156" y="570" width="126" height="30" rx="15" fill="#ffedd5"/><text x="219" y="590" text-anchor="middle" class="tiny">极速响应之星</text>
  <text x="18" y="654" class="tiny">未参与日期暂停连续记录，不显示失败。</text></g>
  <text x="980" y="856" text-anchor="middle" class="phoneTitle">人员详情</text>
</svg>
