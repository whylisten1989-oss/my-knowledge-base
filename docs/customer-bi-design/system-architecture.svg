<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">客服绩效 BI 系统架构图</title>
  <desc id="desc">展示 GitHub、Vercel、浏览器中的 Customer BI、Excel 导入处理链路，以及独立 Supabase Auth、Database、Storage 和 RPC。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08111f"/><stop offset="1" stop-color="#111b32"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#059669"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#60a5fa"/></marker>
    <style>
      text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#e5eefb}
      .title{font-size:34px;font-weight:700}.subtitle{font-size:16px;fill:#93a4bd}.group{fill:#111c33;stroke:#33476a;stroke-width:2}.card{fill:#17243e;stroke:#3b4f72;stroke-width:1.5}.accent{fill:url(#blue);stroke:#67e8f9}.supabase{fill:#102b28;stroke:#34d399;stroke-width:2}.label{font-size:20px;font-weight:700}.small{font-size:14px;fill:#aebed4}.tiny{font-size:12px;fill:#8da0bb}.flow{fill:none;stroke:#60a5fa;stroke-width:3;marker-end:url(#arrow)}.mutedFlow{fill:none;stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <text x="70" y="70" class="title">客服绩效 BI · 系统底层架构</text>
  <text x="70" y="103" class="subtitle">新工作页面独立接入；现有 MindForge OS 业务页面保持不变</text>

  <rect x="65" y="160" width="250" height="750" rx="28" class="group"/>
  <text x="95" y="205" class="label">代码与部署</text>
  <rect x="95" y="250" width="190" height="105" rx="18" class="card" filter="url(#shadow)"/>
  <text x="190" y="292" text-anchor="middle" class="label">GitHub</text><text x="190" y="320" text-anchor="middle" class="small">feature 分支 / 设计文档</text>
  <rect x="95" y="415" width="190" height="105" rx="18" class="accent" filter="url(#shadow)"/>
<text x="190" y="458" text-anchor="middle" class="label">Vercel</text><text x="190" y="486" text-anchor="middle" class="small" style="fill:#e6fbff">Preview → Production</text>
  <rect x="95" y="670" width="190" height="120" rx="18" class="card"/>
  <text x="190" y="710" text-anchor="middle" class="label">现有 MindForge</text><text x="190" y="740" text-anchor="middle" class="small">首页 / 财务 / 习惯 / Wiki</text><text x="190" y="766" text-anchor="middle" class="tiny">本阶段不修改</text>
  <path d="M190 355 V415" class="flow"/><path d="M190 520 V610 H405" class="flow"/><path d="M190 610 V670" class="mutedFlow"/>

  <rect x="370" y="160" width="710" height="750" rx="28" class="group"/>
  <text x="405" y="205" class="label">浏览器 · Customer Service BI</text>
  <rect x="405" y="245" width="640" height="100" rx="20" class="accent" filter="url(#shadow)"/>
  <text x="725" y="286" text-anchor="middle" class="label">Customer BI 静态页面</text>
<text x="725" y="316" text-anchor="middle" class="small" style="fill:#e6fbff">Vue 3 CDN · Tailwind · ECharts · SheetJS</text>

  <rect x="405" y="395" width="175" height="110" rx="18" class="card"/>
  <text x="492" y="437" text-anchor="middle" class="label">Excel 上传</text><text x="492" y="466" text-anchor="middle" class="small">文件 / 日期</text>
  <rect x="625" y="395" width="175" height="110" rx="18" class="card"/>
  <text x="712" y="437" text-anchor="middle" class="label">数据解析</text><text x="712" y="466" text-anchor="middle" class="small">字段映射 / 忽略列</text>
  <rect x="845" y="395" width="175" height="110" rx="18" class="card"/>
  <text x="932" y="437" text-anchor="middle" class="label">人员选择</text><text x="932" y="466" text-anchor="middle" class="small">名单 / 排除 / 新人</text>
  <path d="M580 450 H625" class="flow"/><path d="M800 450 H845" class="flow"/>

  <rect x="405" y="570" width="175" height="110" rx="18" class="card"/>
  <text x="492" y="612" text-anchor="middle" class="label">数据校验</text><text x="492" y="641" text-anchor="middle" class="small">错误 / 警告 / 去重</text>
  <rect x="625" y="570" width="175" height="110" rx="18" class="card"/>
  <text x="712" y="612" text-anchor="middle" class="label">KPI 计算</text><text x="712" y="641" text-anchor="middle" class="small">满意 / 均响 / 转化</text>
  <rect x="845" y="570" width="175" height="110" rx="18" class="card"/>
  <text x="932" y="612" text-anchor="middle" class="label">排名与荣誉</text><text x="932" y="641" text-anchor="middle" class="small">预览 / 正式快照</text>
  <path d="M932 505 V535 H492 V570" class="flow"/><path d="M580 625 H625" class="flow"/><path d="M800 625 H845" class="flow"/>

  <rect x="405" y="745" width="615" height="110" rx="20" class="card"/>
  <text x="712" y="788" text-anchor="middle" class="label">Dashboard 查询与动态分析</text>
  <text x="712" y="818" text-anchor="middle" class="small">官方快照模式 / 动态人员范围 / 日周月趋势 / 个人详情</text>
  <path d="M932 680 V710 H712 V745" class="flow"/>

  <rect x="1135" y="160" width="400" height="750" rx="28" class="supabase"/>
  <text x="1170" y="205" class="label">独立 Supabase 项目</text>
  <text x="1170" y="232" class="small">与现有 MindForge 数据隔离</text>
  <rect x="1170" y="280" width="330" height="105" rx="18" fill="#123b34" stroke="#34d399"/>
  <text x="1335" y="322" text-anchor="middle" class="label">Supabase Auth</text><text x="1335" y="350" text-anchor="middle" class="small">登录 / 工作空间 / RLS</text>
  <rect x="1170" y="430" width="330" height="140" rx="18" fill="#123b34" stroke="#34d399"/>
  <text x="1335" y="472" text-anchor="middle" class="label">Supabase Database</text><text x="1335" y="501" text-anchor="middle" class="small">导入批次 · 人员范围 · KPI 快照</text><text x="1335" y="527" text-anchor="middle" class="small">排名 · 荣誉 · 团队汇总</text>
  <rect x="1170" y="620" width="155" height="105" rx="18" fill="#123b34" stroke="#34d399"/>
  <text x="1247" y="660" text-anchor="middle" class="label">RPC</text><text x="1247" y="688" text-anchor="middle" class="small">原子确认入库</text>
  <rect x="1345" y="620" width="155" height="105" rx="18" fill="#123b34" stroke="#34d399"/>
  <text x="1422" y="660" text-anchor="middle" class="label">Storage</text><text x="1422" y="688" text-anchor="middle" class="small">原始 Excel / 归档</text>
  <rect x="1170" y="775" width="330" height="80" rx="18" fill="#123b34" stroke="#34d399"/>
  <text x="1335" y="808" text-anchor="middle" class="label">外部备份出口</text><text x="1335" y="835" text-anchor="middle" class="small">S3 / R2 / Drive / NAS</text>
  <path d="M1045 295 H1135" class="flow"/><path d="M1020 625 H1105 V500 H1170" class="flow"/><path d="M1020 800 H1090 V675 H1170" class="flow"/><path d="M1335 725 V775" class="mutedFlow"/>
  <text x="775" y="952" text-anchor="middle" class="tiny">微信小店均响：解析时识别并忽略，不进入 KPI、评分、排名、Dashboard 或数据库核心字段</text>
</svg>
