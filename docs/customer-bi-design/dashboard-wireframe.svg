<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Dashboard 方案 A 与方案 B 对比</title><desc id="desc">并列展示高密度管理驾驶舱与现代产品化布局的结构和优缺点。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef4fb"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#203a59" flood-opacity=".12"/></filter><style>text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#18324f}.title{font-size:34px;font-weight:700}.sub{font-size:16px;fill:#64748b}.head{font-size:24px;font-weight:700}.label{font-size:15px;font-weight:700}.small{font-size:13px;fill:#667b91}.frame{fill:#fff;stroke:#cbd8e7;stroke-width:2}.dark{fill:#111d32}.bar{fill:#1c2c47}.block{fill:#e7eef7;stroke:#cbd8e7}.accent{fill:#2563eb}.green{fill:#10b981}.warn{fill:#f59e0b}.note{fill:#fff;stroke:#d5dfeb}</style></defs>
  <rect width="1600" height="920" fill="url(#bg)"/>
  <text x="60" y="62" class="title">Dashboard 布局方案对比</text><text x="60" y="94" class="sub">本阶段保留两套方向，不替用户做最终选择</text>

  <text x="80" y="150" class="head">方案 A · 管理驾驶舱</text><text x="830" y="150" class="head">方案 B · 现代产品化</text>
  <g transform="translate(70 180)" filter="url(#shadow)"><rect width="700" height="500" rx="24" class="dark"/><rect x="22" y="20" width="656" height="48" rx="10" class="bar"/><rect x="22" y="88" width="98" height="70" rx="10" class="accent"/><rect x="132" y="88" width="98" height="70" rx="10" class="bar"/><rect x="242" y="88" width="98" height="70" rx="10" class="bar"/><rect x="352" y="88" width="98" height="70" rx="10" class="bar"/><rect x="462" y="88" width="98" height="70" rx="10" class="bar"/><rect x="572" y="88" width="106" height="70" rx="10" class="bar"/><rect x="22" y="178" width="425" height="145" rx="12" class="bar"/><polyline points="42,293 105,260 168,278 230,220 295,245 360,205 425,225" fill="none" stroke="#38bdf8" stroke-width="4"/><rect x="462" y="178" width="216" height="145" rx="12" class="bar"/><rect x="22" y="343" width="425" height="100" rx="12" class="bar"/><g fill="#10b981"><circle cx="60" cy="380" r="8"/><circle cx="90" cy="380" r="8"/><circle cx="120" cy="380" r="8"/><circle cx="150" cy="380" r="8"/><circle cx="180" cy="380" r="8"/></g><g fill="#f59e0b"><circle cx="210" cy="380" r="8"/><circle cx="240" cy="380" r="8"/></g><rect x="462" y="343" width="216" height="100" rx="12" class="bar"/><rect x="22" y="463" width="656" height="24" rx="8" class="bar"/></g>
  <g transform="translate(820 180)" filter="url(#shadow)"><rect width="710" height="500" rx="24" class="frame"/><rect x="24" y="22" width="662" height="44" rx="10" class="block"/><rect x="24" y="86" width="240" height="130" rx="18" class="accent"/><rect x="284" y="86" width="126" height="60" rx="14" class="block"/><rect x="430" y="86" width="126" height="60" rx="14" class="block"/><rect x="576" y="86" width="110" height="60" rx="14" class="block"/><rect x="284" y="156" width="126" height="60" rx="14" class="block"/><rect x="430" y="156" width="126" height="60" rx="14" class="block"/><rect x="576" y="156" width="110" height="60" rx="14" class="block"/><rect x="24" y="238" width="430" height="150" rx="18" class="frame"/><polyline points="45,365 110,330 175,345 240,290 305,312 370,270 430,285" fill="none" stroke="#2563eb" stroke-width="4"/><rect x="474" y="238" width="212" height="150" rx="18" class="frame"/><rect x="24" y="408" width="290" height="65" rx="16" class="frame"/><rect x="334" y="408" width="352" height="65" rx="16" class="frame"/></g>

  <g transform="translate(70 710)"><rect width="700" height="160" rx="20" class="note"/><text x="26" y="38" class="label">优点</text><text x="92" y="38" class="small">同屏信息量大；趋势、榜单和异常对照快；适合主管日复盘与大屏。</text><text x="26" y="78" class="label">缺点</text><text x="92" y="78" class="small">学习成本较高；小屏需要折叠；视觉压力更大。</text><text x="26" y="120" class="label">适合</text><text x="92" y="120" class="small">固定电脑、主管驾驶舱、每天快速扫描全队。</text></g>
  <g transform="translate(820 710)"><rect width="710" height="160" rx="20" class="note"/><text x="26" y="38" class="label">优点</text><text x="92" y="38" class="small">重点突出、留白充分、产品感强，个人详情和移动端更易延展。</text><text x="26" y="78" class="label">缺点</text><text x="92" y="78" class="small">同屏横向比较较少；可能需要滚动或进入二级页面。</text><text x="26" y="120" class="label">适合</text><text x="92" y="120" class="small">日常桌面使用、跨角色使用、后续产品化扩展。</text></g>
</svg>
