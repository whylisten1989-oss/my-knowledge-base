<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Dashboard 方案 B：现代产品化</title><desc id="desc">留白更多的产品化 Dashboard，以团队健康度和趋势为主，排行榜、亮点和人员卡片分层展示。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#edf4fb"/></linearGradient><linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1d4ed8"/><stop offset="1" stop-color="#0891b2"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e3a5f" flood-opacity=".12"/></filter><style>text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#17324d}.title{font-size:27px;font-weight:700}.small{font-size:13px;fill:#6a7f95}.label{font-size:16px;font-weight:700}.value{font-size:30px;font-weight:700}.panel{fill:#fff;stroke:#d7e1ed;stroke-width:1.5}.hero{fill:url(#hero)}.chip{fill:#eef3f8}.line{fill:none;stroke:#2563eb;stroke-width:4}.line2{fill:none;stroke:#14b8a6;stroke-width:3}.grid{stroke:#e4eaf1}.avatar{fill:#e0ecff}.person{fill:#fff;stroke:#d7e1ed}</style></defs>
