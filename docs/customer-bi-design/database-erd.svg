<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1420" viewBox="0 0 2000 1420" role="img" aria-labelledby="title desc">
  <title id="title">客服绩效 BI 数据库实体关系图</title>
  <desc id="desc">展示人员、名单、导入批次、人员范围、每日指标、排名、荣誉、KPI 规则和团队汇总之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef4fb"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#24415f" flood-opacity=".13"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#64748b"/></marker>
    <style>
      text{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#18324f}.title{font-size:34px;font-weight:700}.sub{font-size:16px;fill:#657890}.entity{fill:#fff;stroke:#b8c9df;stroke-width:2}.core{fill:#eff6ff;stroke:#3b82f6;stroke-width:2.5}.fact{fill:#ecfdf5;stroke:#10b981;stroke-width:2.5}.head{fill:#173b64}.headGreen{fill:#10634b}.name{font-size:18px;font-weight:700;fill:#fff}.field{font-size:13px;fill:#334e68}.pk{font-weight:700;fill:#1d4ed8}.line{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}.dash{fill:none;stroke:#94a3b8;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#arrow)}.legend{font-size:13px;fill:#64748b}
    </style>
  </defs>
  <rect width="2000" height="1420" fill="url(#bg)"/>
  <text x="60" y="62" class="title">客服绩效 BI · 数据库 ER 图</text>
  <text x="60" y="94" class="sub">正式 KPI、排名、荣誉和团队汇总为不可变快照；修正通过新批次 revision 追加</text>

  <!-- top entities -->
  <g transform="translate(60 145)" filter="url(#shadow)"><rect width="300" height="170" rx="16" class="entity"/><path d="M16 0H284Q300 0 300 16V48H0V16Q0 0 16 0Z" class="head"/><text x="20" y="31" class="name">bi_workspaces</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">owner_user_id</text><text x="20" y="121" class="field">name / timezone</text><text x="20" y="144" class="field">created_at</text></g>
  <g transform="translate(410 145)" filter="url(#shadow)"><rect width="300" height="170" rx="16" class="entity"/><path d="M16 0H284Q300 0 300 16V48H0V16Q0 0 16 0Z" class="head"/><text x="20" y="31" class="name">bi_teams</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">FK workspace_id</text><text x="20" y="121" class="field">name / platform</text><text x="20" y="144" class="field">is_active</text></g>
  <g transform="translate(760 145)" filter="url(#shadow)"><rect width="320" height="195" rx="16" class="core"/><path d="M16 0H304Q320 0 320 16V48H0V16Q0 0 16 0Z" class="head"/><text x="20" y="31" class="name">bi_agents</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">FK workspace_id / team_id</text><text x="20" y="121" class="field">employee_code / display_name</text><text x="20" y="144" class="field">platform / is_active</text><text x="20" y="167" class="field">started_on / ended_on</text></g>
  <g transform="translate(1140 145)" filter="url(#shadow)"><rect width="330" height="195" rx="16" class="entity"/><path d="M16 0H314Q330 0 330 16V48H0V16Q0 0 16 0Z" class="head"/><text x="20" y="31" class="name">bi_agent_groups</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">FK workspace_id / team_id</text><text x="20" y="121" class="field">name / platform</text><text x="20" y="144" class="field">owner_user_id</text><text x="20" y="167" class="field">is_default / is_active</text></g>
  <g transform="translate(1530 145)" filter="url(#shadow)"><rect width="390" height="195" rx="16" class="entity"/><path d="M16 0H374Q390 0 390 16V48H0V16Q0 0 16 0Z" class="head"/><text x="20" y="31" class="name">bi_agent_group_members</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">FK group_id / agent_id</text><text x="20" y="121" class="field">workspace_id</text><text x="20" y="144" class="field">valid_from / valid_to</text><text x="20" y="167" class="field">历史成员关系不删除</text></g>

  <!-- middle entities -->
  <g transform="translate(60 440)" filter="url(#shadow)"><rect width="330" height="220" rx="16" class="entity"/><path d="M16 0H314Q330 0 330 16V48H0V16Q0 0 16 0Z" class="head"/><text x="20" y="31" class="name">bi_kpi_rules</text><text x="20" y="75" class="field pk">PK id / version</text><text x="20" y="98" class="field">targets / weights</text><text x="20" y="121" class="field">scoring_policy</text><text x="20" y="144" class="field">ranking / achievement_policy</text><text x="20" y="167" class="field">streak_policy</text><text x="20" y="190" class="field">effective_from / to</text></g>
  <g transform="translate(455 420)" filter="url(#shadow)"><rect width="390" height="260" rx="16" class="core"/><path d="M16 0H374Q390 0 390 16V48H0V16Q0 0 16 0Z" class="head"/><text x="20" y="31" class="name">bi_import_batches</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">business_date / scope_key</text><text x="20" y="121" class="field">file_hash / storage_path</text><text x="20" y="144" class="field">snapshot_revision / status</text><text x="20" y="167" class="field">FK source_group_id / kpi_rule_id</text><text x="20" y="190" class="field">supersedes_batch_id</text><text x="20" y="213" class="field">included / excluded counts</text><text x="20" y="236" class="field">uploaded_by / confirmed_by</text></g>
  <g transform="translate(910 440)" filter="url(#shadow)"><rect width="390" height="220" rx="16" class="core"/><path d="M16 0H374Q390 0 390 16V48H0V16Q0 0 16 0Z" class="head"/><text x="20" y="31" class="name">bi_import_batch_agents</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">FK batch_id / agent_id</text><text x="20" y="121" class="field">source_account / nickname</text><text x="20" y="144" class="field">is_included / selection_source</text><text x="20" y="167" class="field">new / missing / inactive</text><text x="20" y="190" class="field">team &amp; name snapshot</text></g>
  <g transform="translate(1365 440)" filter="url(#shadow)"><rect width="390" height="220" rx="16" class="entity"/><path d="M16 0H374Q390 0 390 16V48H0V16Q0 0 16 0Z" class="head"/><text x="20" y="31" class="name">bi_import_rows</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">FK batch_id</text><text x="20" y="121" class="field">raw / normalized_payload</text><text x="20" y="144" class="field">ignored_payload</text><text x="20" y="167" class="field">validation_status / messages</text><text x="20" y="190" class="field">source_row_key / row_hash</text></g>

  <!-- facts -->
  <g transform="translate(60 805)" filter="url(#shadow)"><rect width="420" height="260" rx="16" class="fact"/><path d="M16 0H404Q420 0 420 16V48H0V16Q0 0 16 0Z" class="headGreen"/><text x="20" y="31" class="name">bi_daily_metrics</text><text x="20" y="75" class="field pk">PK id · UNIQUE batch_id + agent_id</text><text x="20" y="98" class="field">business_date / agent / team snapshot</text><text x="20" y="121" class="field">good / bad / satisfaction_rate</text><text x="20" y="144" class="field">inquiry / order / conversion_rate</text><text x="20" y="167" class="field">avg_response_seconds</text><text x="20" y="190" class="field">targets / component scores</text><text x="20" y="213" class="field">total_score / met flags</text><text x="20" y="236" class="field">extra metrics JSON · immutable</text></g>
  <g transform="translate(545 805)" filter="url(#shadow)"><rect width="420" height="240" rx="16" class="fact"/><path d="M16 0H404Q420 0 420 16V48H0V16Q0 0 16 0Z" class="headGreen"/><text x="20" y="31" class="name">bi_daily_rankings</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">FK batch_id / agent_id</text><text x="20" y="121" class="field">ranking_scope / scope_key</text><text x="20" y="144" class="field">scope_label / participant_count</text><text x="20" y="167" class="field">rank_position / total_score</text><text x="20" y="190" class="field">tie_break_snapshot</text><text x="20" y="213" class="field">官方排名不可变</text></g>
  <g transform="translate(1030 805)" filter="url(#shadow)"><rect width="420" height="240" rx="16" class="fact"/><path d="M16 0H404Q420 0 420 16V48H0V16Q0 0 16 0Z" class="headGreen"/><text x="20" y="31" class="name">bi_achievements</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">FK batch_id / agent_id / rule</text><text x="20" y="121" class="field">achievement_code / name snapshot</text><text x="20" y="144" class="field">scope / reason</text><text x="20" y="167" class="field">metric_snapshot</text><text x="20" y="190" class="field">manual / granted_by</text><text x="20" y="213" class="field">荣誉快照不可变</text></g>
  <g transform="translate(1515 805)" filter="url(#shadow)"><rect width="420" height="260" rx="16" class="fact"/><path d="M16 0H404Q420 0 420 16V48H0V16Q0 0 16 0Z" class="headGreen"/><text x="20" y="31" class="name">bi_team_daily_summary</text><text x="20" y="75" class="field pk">PK id</text><text x="20" y="98" class="field">FK batch_id / team_id / rule</text><text x="20" y="121" class="field">scope_label / participant_count</text><text x="20" y="144" class="field">aggregated good / bad / rate</text><text x="20" y="167" class="field">aggregated inquiry / order / rate</text><text x="20" y="190" class="field">simple avg response</text><text x="20" y="213" class="field">avg_total_score</text><text x="20" y="236" class="field">官方团队快照不可变</text></g>

  <!-- relationships -->
  <path d="M360 225 H410" class="line"/><path d="M710 225 H760" class="line"/><path d="M1080 225 H1140" class="line"/><path d="M1470 225 H1530" class="line"/>
  <path d="M920 340 V390 H650 V420" class="line"/><path d="M1305 340 V380 H650 V420" class="dash"/>
  <path d="M390 550 H455" class="line"/><path d="M845 550 H910" class="line"/><path d="M845 585 H1365" class="line"/>
  <path d="M1105 660 V730 H270 V805" class="line"/><path d="M650 680 V745 H270 V805" class="line"/>
  <path d="M650 680 V745 H755 V805" class="line"/><path d="M650 680 V730 H1240 V805" class="line"/><path d="M650 680 V715 H1725 V805" class="line"/>
  <path d="M920 340 V760 H270 V805" class="dash"/>
  <path d="M225 660 V760 H270 V805" class="dash"/>

  <rect x="60" y="1190" width="1880" height="150" rx="22" fill="#fff" stroke="#cbd5e1"/>
  <text x="90" y="1230" class="legend">实线：确认入库时的主外键/快照关系　　虚线：规则、人员或名单提供的上下文关系</text>
  <text x="90" y="1264" class="legend">原始文件全部人员保存在 bi_import_batch_agents；只有 is_included = true 的人员进入 bi_daily_metrics。</text>
  <text x="90" y="1298" class="legend">微信小店均响不在 bi_daily_metrics 或任何事实表中。未来新增 KPI 通过规则与 extra_metric_values JSON 扩展。</text>
</svg>
